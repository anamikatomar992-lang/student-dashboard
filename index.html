<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Study Sanctuary</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="background-overlay"></div>
    <div class="login-card glass">
        <i data-lucide="book-open" class="login-logo"></i>
        <h1>Welcome Back</h1>
        <p>Enter your library credentials to continue.</p>
        <form action="dashboard.html">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Passcode" required>
            <button type="submit" class="primary-btn">Enter Library</button>
        </form>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
